<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JeenaFlix Video Player</title>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    .player-wrap {
      width: 100%;
      height: 100vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    video {
      width: 100%;
      height: 100%;
      background: #000;
      object-fit: contain;
    }

    .message {
      padding: 20px;
      text-align: center;
      line-height: 1.6;
      color: #fff;
    }

    .message code {
      color: #ff3333;
      word-break: break-all;
    }
  </style>
</head>
<body>

  <div class="player-wrap" id="playerWrap">
    <video id="video" controls autoplay playsinline></video>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const videoSrc = params.get("url");
    const video = document.getElementById("video");
    const playerWrap = document.getElementById("playerWrap");

    function showMessage(message) {
      playerWrap.innerHTML = '<div class="message">' + message + '</div>';
    }

    if (!videoSrc) {
      showMessage(
        '<h2>No video URL found</h2>' +
        '<p>Use this format:</p>' +
        '<code>player.html?url=https://example.com/video.m3u8</code>'
      );
    } else if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(videoSrc);
      hls.attachMedia(video);

      hls.on(Hls.Events.ERROR, function(event, data) {
        if (data.fatal) {
          showMessage('<h2>Video failed to load</h2><p>Please check the m3u8 link.</p>');
        }
      });
    } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
      video.src = videoSrc;
    } else {
      showMessage('<h2>Your browser does not support HLS playback.</h2>');
    }
  </script>

</body>
</html>
